<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Doctor Login</title>

<style>
/* 🌌 FULL BACKGROUND */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* AI + DOCTOR BACKGROUND IMAGE */
.background {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url("https://images.unsplash.com/photo-1576091160550-2173dba999ef?auto=format&fit=crop&w=1600&q=80")
    center/cover no-repeat;
    z-index: -2;
}

/* DARK OVERLAY FOR BETTER TEXT VISIBILITY */
.background::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.65);
}

/* 🔐 LOGIN BOX */
.login-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    width: 320px;
    padding: 25px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border-radius: 15px;

    color: white;
    text-align: center;

    animation: floatUp 1s ease-out;
    z-index: 2;
}

/* smooth entry animation */
@keyframes floatUp {
    from {
        transform: translate(-50%, -40%);
        opacity: 0;
    }
    to {
        transform: translate(-50%, -50%);
        opacity: 1;
    }
}

/* INPUT FIELDS */
input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    outline: none;
    transition: 0.3s;
}

input:focus {
    box-shadow: 0 0 10px #00e5ff;
    transform: scale(1.03);
}

/* BUTTON */
button {
    width: 95%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #00e5ff;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #00e5ff;
}
</style>
</head>

<body>

<!-- 🌌 BACKGROUND -->
<div class="background"></div>

<!-- 🔐 LOGIN FORM -->
<div class="login-container">
    <h2>AI Doctor Login</h2>
    <input type="text" placeholder="Username"><br>
    <input type="password" placeholder="Password"><br>
   <button onclick="window.location.href='/home'">
    Login
</button>
</div>

</body>
</html>
