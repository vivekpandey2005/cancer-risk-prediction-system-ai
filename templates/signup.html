<!DOCTYPE html><html>
<head>
<title>Sign Up</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;

    /* 🧬 CANCER AI BACKGROUND */
    background:
        url("https://images.unsplash.com/photo-1576086213369-97a306d36557?auto=format&fit=crop&w=1600&q=80"),
        url("https://images.unsplash.com/photo-1581595219315-a187dd40c322?auto=format&fit=crop&w=1600&q=80");

    background-size: cover;
    background-position: center;
    background-blend-mode: overlay;

    animation: zoomBg 20s infinite alternate;
}

/* Zoom animation */
@keyframes zoomBg {
    0% {background-size: 100%;}
    100% {background-size: 115%;}
}

/* Dark + AI glow overlay */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background:
        radial-gradient(circle at center, rgba(0,255,150,0.15), transparent 60%),
        rgba(0,0,0,0.75);

    top: 0;
    left: 0;
    z-index: 0;
}

/* Floating particles (DNA / AI feel) */
body::after {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(#00ffcc 1px, transparent 1px);
    background-size: 45px 45px;
    animation: moveParticles 6s linear infinite;
    opacity: 0.15;
    z-index: 0;
}

@keyframes moveParticles {
    from {transform: translate(0,0);}
    to {transform: translate(-250px,-250px);}
}

/* Glass container */
.container {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
    color: white;

    animation: fadeIn 1s ease;
    box-shadow:
        0 0 30px rgba(0,255,150,0.3),
        0 0 60px rgba(0,255,255,0.1);
}

/* Fade */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}

/* Inputs */
input {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(45deg, #00ffcc, #22c55e);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.08);
    box-shadow: 0 0 20px #00ffcc;
}

/* Link */
a {
    color: #38bdf8;
    text-decoration: none;
}
</style>

</head>

<body>

<div class="container">
    <h2>🧬 Cancer Risk AI Analyzer</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Sign Up</button>
    </form>

    <p>Already have account? <a href="/login">Login</a></p>
</div>

</body>
</html>
