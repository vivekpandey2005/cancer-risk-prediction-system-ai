<!DOCTYPE html>
<html>
<head>
    <title>Feedback</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            margin: 0;
            overflow-x: hidden;
            background: #050816;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .glass {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .star {
            font-size: 45px;
            cursor: pointer;
        }

        .exp-wrapper, .feed-wrapper {
            position: relative;
        }

        .emoji-box {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 200px;
            max-height: 130px;
            overflow-y: auto;
            background: #0f172a;
            border-radius: 10px;
            padding: 8px;
            font-size: 18px;
            display: none;
            z-index: 10;
        }

        .emoji {
            cursor: pointer;
            padding: 3px;
            display: inline-block;
        }

        .emoji:hover {
            transform: scale(1.3);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col text-white">

<div id="particles-js"></div>

<div class="flex flex-1 items-center justify-center">

    <div class="glass p-6 rounded w-[90%] max-w-md">

        <h1 class="text-2xl font-bold text-center mb-4">Feedback Form</h1>

        <!-- STAR -->
        <label class="block mb-2">Rating</label>

        <div id="stars" class="text-center mb-3">
            <span class="star" onclick="setRating(1)">☆</span>
            <span class="star" onclick="setRating(2)">☆</span>
            <span class="star" onclick="setRating(3)">☆</span>
            <span class="star" onclick="setRating(4)">☆</span>
            <span class="star" onclick="setRating(5)">☆</span>
        </div>

        <p id="ratingText" class="text-center mb-3 text-gray-300">Select rating</p>

        <!-- EXPERIENCE -->
        <label class="block mb-1">Your Experience</label>

        <div class="exp-wrapper">
            <textarea id="experience"
                class="w-full p-2 mb-3 bg-slate-900 rounded"
                rows="4"></textarea>

            <button onclick="toggleEmoji('emojiBox')"
                class="absolute bottom-5 right-3 bg-slate-700 px-2 py-1 rounded text-sm">
                😀
            </button>

            <div id="emojiBox" class="emoji-box">
                <span class="emoji">😀</span>
                <span class="emoji">😃</span>
                <span class="emoji">😄</span>
                <span class="emoji">😁</span>
                <span class="emoji">😆</span>
                <span class="emoji">😅</span>
                <span class="emoji">😂</span>
                <span class="emoji">😊</span>
                <span class="emoji">🙂</span>
                <span class="emoji">🙃</span>
                <span class="emoji">😉</span>
                <span class="emoji">😍</span>
                <span class="emoji">🥰</span>
                <span class="emoji">😘</span>
                <span class="emoji">😎</span>
                <span class="emoji">🤩</span>
                <span class="emoji">🔥</span>
                <span class="emoji">💯</span>
                <span class="emoji">⭐</span>
            </div>
        </div>

        <!-- FEEDBACK -->
        <label class="block mb-1">Feedback</label>

        <div class="feed-wrapper">

            <input id="feedback"
                class="w-full p-2 mb-3 bg-slate-900 rounded"
                placeholder="Write feedback...">

            <button onclick="toggleEmoji('emojiBoxFeedback')"
                class="absolute bottom-5 right-3 bg-slate-700 px-2 py-1 rounded text-sm">
                😀
            </button>

            <div id="emojiBoxFeedback" class="emoji-box">
                <span class="emoji">😀</span>
                <span class="emoji">😃</span>
                <span class="emoji">😄</span>
                <span class="emoji">😁</span>
                <span class="emoji">😆</span>
                <span class="emoji">😅</span>
                <span class="emoji">😂</span>
                <span class="emoji">😊</span>
                <span class="emoji">🙂</span>
                <span class="emoji">🙃</span>
                <span class="emoji">😉</span>
                <span class="emoji">😍</span>
                <span class="emoji">🥰</span>
                <span class="emoji">😘</span>
                <span class="emoji">😎</span>
                <span class="emoji">🤩</span>
                <span class="emoji">🔥</span>
                <span class="emoji">💯</span>
                <span class="emoji">⭐</span>
            </div>
        </div>

        <button onclick="submitFeedback()"
            class="w-full bg-purple-600 p-2 rounded hover:bg-purple-700">
            Submit
        </button>

        <p id="msg" class="mt-3 text-green-400 text-center"></p>

    </div>

</div>

<div class="text-center p-4">
    <a href="/" class="bg-blue-600 text-white px-6 py-2 rounded">
        🏠 Go Home
    </a>
</div>

<script>

let ratingValue = 0;

// STAR RATING
function setRating(v) {
    ratingValue = v;

    let stars = document.querySelectorAll(".star");
    for (let i = 0; i < stars.length; i++) {
        stars[i].innerText = i < v ? "★" : "☆";
        stars[i].style.color = i < v ? "gold" : "white";
    }
}

// TOGGLE EMOJI
function toggleEmoji(id) {
    let box = document.getElementById(id);
    box.style.display = box.style.display === "block" ? "none" : "block";
}

// INSERT EMOJI + AUTO CLOSE
document.addEventListener("click", function(e) {
    if (e.target.classList.contains("emoji")) {

        let emoji = e.target.innerText;

        if (e.target.closest("#emojiBox")) {
            insertAtCursor("experience", emoji);
            document.getElementById("emojiBox").style.display = "none";
        }

        if (e.target.closest("#emojiBoxFeedback")) {
            insertAtCursor("feedback", emoji);
            document.getElementById("emojiBoxFeedback").style.display = "none";
        }
    }
});

function insertAtCursor(id, emoji) {
    let box = document.getElementById(id);

    let start = box.selectionStart;
    let end = box.selectionEnd;

    box.value =
        box.value.substring(0, start) +
        emoji +
        box.value.substring(end);

    box.focus();
    box.selectionEnd = start + emoji.length;
}

// CONFETTI
function showConfetti() {
    confetti({
        particleCount: 150,
        spread: 90,
        origin: { y: 0.6 }
    });
}

// SUBMIT FUNCTION (FIXED)
function submitFeedback() {
    let experience = document.getElementById("experience").value;
    let feedback = document.getElementById("feedback").value;

    let data = JSON.parse(localStorage.getItem("feedbacks") || "[]");

    data.push({
        rating: ratingValue,
        experience,
        feedback,
        date: new Date().toLocaleString()
    });

    localStorage.setItem("feedbacks", JSON.stringify(data));

    document.getElementById("msg").innerText = "Feedback saved successfully! 🎉";

    showConfetti();
}

// PARTICLES BACKGROUND
particlesJS("particles-js", {
  particles: {
    number: { value: 60 },
    color: { value: "#ffffff" },
    shape: { type: "circle" },
    opacity: { value: 0.5 },
    size: { value: 3 },
    move: { enable: true, speed: 2 }
  }
});

</script>

</body>
</html>
