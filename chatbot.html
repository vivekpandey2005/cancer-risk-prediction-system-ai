<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter', sans-serif;
}body{ height:100vh; overflow:hidden; display:flex; justify-content:center; align-items:center; background:#0f172a; }

/* 3D animated background */ #bg { position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; }

.chat-container{ width:400px; height:600px; background: rgba(255,255,255,0.06); backdrop-filter: blur(15px); border-radius:20px; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,0.5); z-index:2; }

.chat-header{ padding:15px; text-align:center; font-weight:600; color:white; background: rgba(255,255,255,0.08); }

.chat-box{ flex:1; padding:15px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }

.message{ padding:10px 14px; border-radius:12px; max-width:75%; font-size:14px; line-height:1.4; word-wrap:break-word; }

.user{ align-self:flex-end; background:#3b82f6; color:white; }

.bot{ align-self:flex-start; background:#1f2937; color:white; }

.input-box{ display:flex; padding:10px; background: rgba(255,255,255,0.08); }

input{ flex:1; padding:10px; border:none; outline:none; border-radius:10px; background:#111827; color:white; }

button{ margin-left:10px; padding:10px 15px; border:none; border-radius:10px; background:#3b82f6; color:white; cursor:pointer; }

/* Go Home Button */ .home-btn{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%); padding:10px 20px; background:#22c55e; color:white; border:none; border-radius:25px; cursor:pointer; font-weight:600; box-shadow:0 5px 15px rgba(0,0,0,0.3); z-index:3; transition:0.3s; }

.home-btn:hover{ background:#16a34a; transform:translateX(-50%) scale(1.05); }

</style>
</head>
<body><canvas id="bg"></canvas>

<div class="chat-container">
    <div class="chat-header">AI Chatbot</div>
    <div class="chat-box" id="chatBox"></div>
    <div class="input-box">
        <input id="input" type="text" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div><!-- Go Home Button --><button class="home-btn" onclick="goHome()">Go Home</button>

<script>
// simple 3D particle animation
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        z: Math.random()*5,
        r: Math.random()*2
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let p of particles){
        p.y += p.z;
        if(p.y > canvas.height) p.y = 0;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = "rgba(59,130,246,0.6)";
        ctx.fill();
    }

    requestAnimationFrame(animate);
}
animate();

function addMessage(text, type){
    const msg = document.createElement("div");
    msg.classList.add("message", type);
    msg.innerText = text;
    document.getElementById("chatBox").appendChild(msg);
    document.getElementById("chatBox").scrollTop = document.getElementById("chatBox").scrollHeight;
}

function sendMessage(){
    const input = document.getElementById("input");
    const message = input.value;
    if(!message) return;

    addMessage(message, "user");
    input.value = "";

    fetch("/ask", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({message})
    })
    .then(res=>res.json())
    .then(data=>{
        addMessage(data.reply, "bot");
    })
    .catch(()=>{
        addMessage("Error connecting to server", "bot");
    });
}

// Home button function
function goHome(){
    window.location.href = "/";
}
</script></body>
</html>
